<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .form-container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="tel"], input[type="password"] {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        .error-msg { color: #dc3545; font-size: 13px; margin-top: 5px; display: block; min-height: 18px; }
        input.invalid { border-color: #dc3545; background-color: #fff8f8; }
        .success-msg { text-align: center; color: #28a745; display: none; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="form-container" id="regContainer">
    <h2 style="text-align: center;">Đăng Ký Tài Khoản</h2>
    <form id="regForm" novalidate>
        <div class="form-group">
            <label>Họ và tên</label>
            <input type="text" id="fullname" placeholder="Nhập ít nhất 3 ký tự">
            <span class="error-msg" id="err-fullname"></span>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="name@domain.com">
            <span class="error-msg" id="err-email"></span>
        </div>

        <div class="form-group">
            <label>Số điện thoại</label>
            <input type="tel" id="phone" placeholder="10 số, bắt đầu bằng 0">
            <span class="error-msg" id="err-phone"></span>
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="≥ 8 ký tự, 1 hoa, 1 thường, 1 số">
            <span class="error-msg" id="err-password"></span>
        </div>

        <div class="form-group">
            <label>Xác nhận mật khẩu</label>
            <input type="password" id="confirmPassword">
            <span class="error-msg" id="err-confirmPassword"></span>
        </div>

        <div class="form-group">
            <label>Giới tính</label>
            <input type="radio" name="gender" value="Nam"> Nam
            <input type="radio" name="gender" value="Nữ"> Nữ
            <span class="error-msg" id="err-gender"></span>
        </div>

        <div class="form-group">
            <input type="checkbox" id="terms"> Tôi đồng ý với điều khoản
            <span class="error-msg" id="err-terms"></span>
        </div>

        <button type="submit">Đăng ký ngay</button>
    </form>
</div>

<div class="success-msg" id="successArea">
    <h1> Đăng ký thành công!</h1>
    <p>Chào mừng thành viên mới: <span id="displayUser" style="font-weight: bold;"></span></p>
</div>

<script src="form-validation.js"></script>
</body>
</html>

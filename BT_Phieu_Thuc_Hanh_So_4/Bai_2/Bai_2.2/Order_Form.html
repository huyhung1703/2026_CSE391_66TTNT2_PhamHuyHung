<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Order Form</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; padding: 20px; display: flex; justify-content: center; }
        .order-container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        textarea { height: 80px; resize: none; }
        .error-msg { color: #d32f2f; font-size: 13px; margin-top: 4px; display: block; min-height: 18px; }
        .invalid { border-color: #d32f2f !important; background-color: #fff8f8; }

        .char-count { text-align: right; font-size: 12px; color: #666; }
        .total-box { background: #e3f2fd; padding: 15px; border-radius: 6px; text-align: right; font-size: 1.2em; margin-top: 10px; border: 1px dashed #1e88e5; }
        .price-val { color: #d32f2f; font-weight: bold; }

        #confirmOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .confirm-box { background: white; padding: 25px; border-radius: 8px; width: 350px; text-align: left; }
        .confirm-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-ok { background: #28a745; color: white; }
        .btn-cancel { background: #6c757d; color: white; }
    </style>
</head>
<body>

<div class="order-container">
    <h2 style="text-align: center; color: #1e88e5;">🛒 ĐẶT HÀNG TRỰC TUYẾN</h2>
    <form id="orderForm" novalidate>
        <div class="form-group">
            <label>Sản phẩm</label>
            <select id="product">
                <option value="">-- Chọn sản phẩm --</option>
                <option value="Laptop">Laptop (20.000.000đ)</option>
                <option value="Iphone">Iphone 15 (25.000.000đ)</option>
                <option value="AirPods">AirPods Pro (5.000.000đ)</option>
            </select>
            <span class="error-msg" id="err-product"></span>
        </div>

        <div class="form-group">
            <label>Số lượng (1-99)</label>
            <input type="number" id="quantity" value="1" min="1" max="99">
            <span class="error-msg" id="err-quantity"></span>
        </div>

        <div class="total-box">
            Tổng cộng: <span class="price-val" id="totalDisplay">0đ</span>
        </div>

        <div class="form-group">
            <label>Ngày giao hàng</label>
            <input type="date" id="deliveryDate">
            <span class="error-msg" id="err-deliveryDate"></span>
        </div>

        <div class="form-group">
            <label>Địa chỉ giao hàng</label>
            <input type="text" id="address" placeholder="Ít nhất 10 ký tự">
            <span class="error-msg" id="err-address"></span>
        </div>

        <div class="form-group">
            <label>Ghi chú</label>
            <textarea id="note" maxlength="300" placeholder="Yêu cầu đặc biệt..."></textarea>
            <div class="char-count"><span id="currentChar">0</span>/200</div>
            <span class="error-msg" id="err-note"></span>
        </div>

        <div class="form-group">
            <label>Thanh toán</label>
            <input type="radio" name="payment" value="COD"> COD 
            <input type="radio" name="payment" value="Chuyển khoản"> Chuyển khoản
            <input type="radio" name="payment" value="Ví điện tử"> Ví điện tử
            <span class="error-msg" id="err-payment"></span>
        </div>

        <button type="submit" style="width:100%; padding:15px; background:#1e88e5; color:white; border:none; border-radius:6px; cursor:pointer; font-size:16px;">GỬI ĐƠN HÀNG</button>
    </form>
</div>

<div id="confirmOverlay">
    <div class="confirm-box">
        <h3>Xác nhận đơn hàng?</h3>
        <div id="summaryContent"></div>
        <div class="confirm-btns">
            <button class="btn btn-ok" id="btnFinalOk">Xác nhận</button>
            <button class="btn btn-cancel" id="btnFinalCancel">Hủy</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
